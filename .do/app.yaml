name: soa-app
region: nyc1
services:
  - name: soa-frontend
    image:
      registry: registry.hub.docker.com/REPLACE_USER/soa-frontend:latest
    run_command: node api-gateway/server.js
    envs:
      - key: GATEWAY_PORT
        value: "8080"
      - key: REST_BASE_URL
        value: "http://user-rest-service:8080"
      - key: SOAP_URL
        value: "http://user-soap-service:8080/ws"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://www.example.com"
      - key: PUBLIC_REST_URL
        value: "/api"
      - key: PUBLIC_SOAP_URL
        value: "/gateway/soap"
    http_port: 8080
    routes:
      - path: /
    health_check:
      protocol: HTTP
      path: /health
      port: 8080

  - name: user-rest-service
    image:
      registry: registry.hub.docker.com/REPLACE_USER/user-rest-service:latest
    envs:
      - key: PROFILE_DB_URL
        value: "jdbc:postgresql://<PG_HOST>:5432/profile_db"
      - key: PROFILE_DB_USER
        value: "<PG_USER>"
      - key: PROFILE_DB_PASSWORD
        value: "<PG_PASSWORD>"
      - key: SOAP_SERVICE_URL
        value: "http://user-soap-service:8080/ws"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://www.example.com"
    http_port: 8080
    health_check:
      protocol: HTTP
      path: /health
      port: 8080

  - name: user-soap-service
    image:
      registry: registry.hub.docker.com/REPLACE_USER/user-soap-service:latest
    envs:
      - key: AUTH_DB_URL
        value: "jdbc:postgresql://<PG_HOST>:5432/auth_db"
      - key: AUTH_DB_USER
        value: "<PG_USER>"
      - key: AUTH_DB_PASSWORD
        value: "<PG_PASSWORD>"
      - key: APP_JWT_SECRET
        value: "<REPLACE_WITH_STRONG_SECRET>"
    http_port: 8080
    health_check:
      protocol: HTTP
      path: /health
      port: 8080

databases: []

# Notes:
# - Replace registry image names with your container registry (Docker Hub, GHCR, or DOCR).
# - Provide managed Postgres connection details via project "Secrets" in DigitalOcean or set them here as envs (recommended to use DO Secrets).
# - Configure domains and TLS in the App Platform UI or via doctl.
